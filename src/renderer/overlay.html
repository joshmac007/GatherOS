<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GatherOS Capture</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      /* Hide the system cursor — overlay.jsx draws its own crosshair
         at the pointer position so the visual is consistent across
         every display regardless of which overlay window macOS thinks
         is frontmost. */
      body { background: transparent; cursor: none; user-select: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./overlay.jsx"></script>
  </body>
</html>
