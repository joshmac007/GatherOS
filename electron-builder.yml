appId: com.gatheros.app
productName: GatherOS
afterSign: scripts/notarize.js
directories:
  output: dist/build
  buildResources: build
files:
  - src/main/**/*
  - dist/renderer/**/*
  - build/tray-icon*.png
  - package.json
asarUnpack:
  - node_modules/better-sqlite3/**/*
  - node_modules/sharp/**/*
  - node_modules/@img/**/*
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false
publish:
  provider: github
  owner: BrettfromDJ
  repo: gatheros
