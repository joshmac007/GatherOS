appId: com.gatheros.app
productName: GatherOS
afterSign: scripts/notarize.js
directories:
  output: dist/build
  buildResources: build
files:
  - src/main/**/*
  - dist/renderer/**/*
  - build/tray-icon*.png
  - package.json
asarUnpack:
  - node_modules/better-sqlite3/**/*
  - node_modules/sharp/**/*
  - node_modules/@img/**/*
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false
  # Declared so the Dock icon highlights when dragging images. The
  # main-process 'open-file' listener actually saves them.
  fileAssociations:
    - ext: png
      role: Editor
    - ext: jpg
      role: Editor
    - ext: jpeg
      role: Editor
    - ext: gif
      role: Editor
    - ext: webp
      role: Editor
    - ext: avif
      role: Editor
    - ext: bmp
      role: Editor
    - ext: heic
      role: Editor
    - ext: tiff
      role: Editor
publish:
  provider: github
  owner: BrettfromDJ
  repo: gatheros
