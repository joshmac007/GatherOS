appId: com.gatherlocal.app
productName: GatherLocal
afterPack: scripts/strip-gendered-locales.js
afterSign: scripts/notarize.js
directories:
  output: dist/build
  buildResources: build
files:
  # Bundle everything under src/ except the renderer source (already
  # built into dist/renderer). Broad-by-default so future code under
  # src/<new-dir>/ doesn't need a separate entry — and never silently
  # crashes the packaged app with "Cannot find module" (regressed in
  # v0.1.22..v0.1.24 when src/shared/licensing-config.js wasn't in
  # the explicit allowlist).
  - src/**/*
  - '!src/renderer/**/*'
  - dist/renderer/**/*
  - build/tray-icon*.png
  - package.json
  # Drop node_modules cruft from the bundled production deps —
  # READMEs, changelogs, test fixtures, examples, source maps,
  # TypeScript .ts.map / .d.ts.map files, .github metadata. None
  # of these are needed at runtime; keeping them in the asar
  # bloats the DMG by 15–25MB depending on the dep tree.
  - '!**/node_modules/*/{*.md,*.markdown,LICENSE.txt,license,LICENSE-*,changelog*,CHANGELOG*,CHANGES*,history*,HISTORY*,readme*,Readme*,README*}'
  - '!**/node_modules/*/{test,tests,__tests__,example,examples,docs,doc,benchmark,benchmarks,coverage,.github,.vscode}'
  - '!**/node_modules/**/*.map'
  - '!**/node_modules/**/*.d.ts'
  - '!**/node_modules/**/*.flow'
  - '!**/node_modules/**/.eslintrc*'
  - '!**/node_modules/**/.prettierrc*'
  - '!**/node_modules/**/tsconfig*.json'
asarUnpack:
  - node_modules/better-sqlite3/**/*
  - node_modules/sharp/**/*
  - node_modules/@img/**/*
  # Unpack the starter-pack zip so yauzl can do random-access
  # reads on it at runtime — reading a zip from inside an asar is
  # not reliably supported on every platform.
  - src/main/starter-pack.zip
mac:
  category: public.app-category.productivity
  # Strip Electron's bundled non-English locales. macOS Sequoia
  # (and some endpoint security tools) flag certain locale.pak
  # files as restricted, which makes codesign fail mid-build with
  # "Operation not permitted". We only ship English UI today, so
  # there's nothing lost — and we drop ~30MB from the app bundle.
  electronLanguages:
    - en
    - en-US
    - en-GB
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false
  # Pinned entitlements (rather than electron-builder's bundled
  # default) so an electron-builder upgrade can't silently drop one
  # and break notarized launches. disable-library-validation in
  # particular is what lets the unsigned better-sqlite3 / sharp
  # .node binaries load under hardened runtime.
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Declared so the Dock icon highlights when dragging images. The
  # main-process 'open-file' listener actually saves them.
  fileAssociations:
    - ext: png
      role: Editor
    - ext: jpg
      role: Editor
    - ext: jpeg
      role: Editor
    - ext: gif
      role: Editor
    - ext: webp
      role: Editor
    - ext: avif
      role: Editor
    - ext: bmp
      role: Editor
    - ext: heic
      role: Editor
    - ext: tiff
      role: Editor
  # Catch-all for image-shaped drops that don't have a concrete file
  # extension yet — Chrome and other browsers drag images as a
  # 'promised file' with the generic public.image UTI; without this
  # entry the Dock icon won't even highlight on those drags. Plus an
  # http/https URL receiver so dragging a link straight onto the
  # Dock saves the image at that URL. LSHandlerRank: None on both so
  # we don't show up as a default browser or default image opener.
  extendInfo:
    CFBundleDocumentTypes:
      - CFBundleTypeName: Image
        CFBundleTypeRole: Editor
        LSHandlerRank: None
        LSItemContentTypes:
          - public.image
    CFBundleURLTypes:
      - CFBundleURLName: GatherLocal
        CFBundleURLSchemes:
          - gatherlocal
        CFBundleTypeRole: Viewer
      - CFBundleURLName: HTTP/HTTPS Image Drop
        CFBundleURLSchemes:
          - http
          - https
        LSHandlerRank: None
    # macOS Services menu — registers a "Save to GatherLocal" item that
    # appears under Services in any app's menu / right-click when the
    # selection is an image or URL. The runtime handler reads the
    # incoming pasteboard via NSApplication's openFile / openURL
    # paths (ports of the same drag-drop receivers above), so files
    # selected and sent through Services drop into the Save flow
    # exactly like a Finder drag-on-Dock.
    NSServices:
      - NSMenuItem:
          default: Save to GatherLocal
        NSMessage: saveToGatherLocal
        NSPortName: GatherLocal
        NSSendTypes:
          - public.image
          - public.url
          - public.file-url
        NSReturnTypes: []
# Custom install-window design. background.png lives under
# directories.buildResources (i.e. build/), and electron-builder
# auto-picks background@2x.png for retina. Window dimensions match
# the 1x background so the image fills edge to edge. Icon coords are
# in the same CSS-pixel space as the background — adjust if your
# design has hot spots at different positions.
#
# format: UDZO — the older but very-well-supported compressed DMG
# format. electron-builder defaults to ULFO on macOS Sequoia, which
# in some configurations renders the DMG window without applying the
# background image. UDZO produces a slightly larger file (~5%) but
# the background reliably shows up.
#
# DO NOT specify path: GatherLocal.app on the type:file entry —
# electron-builder auto-resolves the .app path internally and
# rejects the build with "cannot find specified resource" when the
# path is given explicitly.
dmg:
  background: build/background.png
  format: UDZO
  window:
    width: 540
    height: 380
  iconSize: 100
  contents:
    - x: 140
      y: 170
      type: file
    - x: 400
      y: 170
      type: link
      path: /Applications
publish: null
