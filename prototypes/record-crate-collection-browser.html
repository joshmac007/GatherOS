<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Record-crate collection browser</title>
<style>
  :root{
    --ease:cubic-bezier(0.32,0.72,0,1);
    --font:'Geist Variable','Geist','SF Pro Display',-apple-system,BlinkMacSystemFont,system-ui,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font);background:#000;color:#fff;-webkit-font-smoothing:antialiased;overflow:hidden;user-select:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  /* ── Header ────────────────────────────────────────────── */
  .hdr{position:fixed;left:0;right:0;top:0;height:76px;display:flex;align-items:center;padding:0 30px;z-index:700}
  .mark{display:flex;align-items:baseline;gap:10px}
  .mark .w{font-size:15px;font-weight:700;letter-spacing:-.02em}
  .mark .s{font-size:11.5px;color:rgba(255,255,255,.45)}
  .toggle{position:absolute;left:50%;transform:translateX(-50%);display:flex;padding:3px;border:1px solid rgba(255,255,255,.16);border-radius:999px;background:rgba(255,255,255,.03)}
  .tg{padding:7px 18px;border-radius:999px;font-size:11.5px;font-weight:600;letter-spacing:.02em;color:rgba(255,255,255,.55)}
  .tg.on{background:#fff;color:#000}
  .search{margin-left:auto;display:flex;align-items:center;gap:8px;padding:8px 14px;border:1px solid rgba(255,255,255,.16);border-radius:999px;font-size:11.5px;color:rgba(255,255,255,.55)}
  .search b{font-weight:600;color:rgba(255,255,255,.75)}

  /* ── The crate ─────────────────────────────────────────── */
  .stage{position:fixed;inset:0;background:#000;overflow:hidden}
  .row{position:absolute;inset:0;display:flex}
  .slot{flex:1;position:relative;animation:rise .8s var(--ease) backwards;animation-delay:calc(var(--i)*55ms)}
  @keyframes rise{from{opacity:0;transform:translateY(70px)}}

  .lab{position:absolute;top:13vh;left:10px;right:4px;opacity:.4;transition:opacity .25s;cursor:pointer;z-index:500}
  .slot:hover .lab,.slot.sel .lab{opacity:1}
  .lab .n{font-size:12.5px;font-weight:600;letter-spacing:-.01em;line-height:1.32}
  .lab .m{font-size:10.5px;color:rgba(255,255,255,.55);margin-top:3px}
  .lab .p{font-size:9px;margin-top:10px;color:rgba(255,255,255,.8)}

  .covw{position:absolute;left:50%;top:27vh;width:320px;height:70vh;margin-left:-160px;cursor:pointer;
    filter:brightness(var(--br,1));
    transition:filter .55s,transform .55s var(--ease)}
  /* 3D group: the art face plus real folded-back spines, so each sleeve
     has cardboard thickness instead of being a zero-width plane.
     (Brightness lives on the wrapper — a filter on the preserve-3d
     element itself would flatten the edges.) */
  .c3d{position:relative;width:100%;height:100%;transform-style:preserve-3d;
    transform:perspective(950px) rotateY(var(--ry));
    transition:transform .55s var(--ease)}
  .cov{position:absolute;inset:0;overflow:hidden;border-radius:3px;backface-visibility:hidden;
    box-shadow:0 12px 30px rgba(0,0,0,.6),0 42px 90px rgba(0,0,0,.55)}
  .cov::before{content:'';position:absolute;inset:0;background:linear-gradient(105deg,rgba(255,255,255,.15),transparent 34%);pointer-events:none;z-index:3}
  .cov svg{position:absolute;inset:0;width:100%;height:100%}
  /* Cardboard spines: thin planes folded 90° back from each vertical edge.
     The near-side spine is what reads as thickness when a sleeve sits
     edge-on; the far one hides behind the face. */
  .edge{position:absolute;top:0;bottom:0;width:14px;
    background:linear-gradient(180deg,#dcd7cd 0%,#c6c1b7 55%,#a8a299 100%);
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.10)}
  .edge.l{left:0;transform-origin:left center;transform:rotateY(90deg)}
  .edge.r{right:0;transform-origin:right center;transform:rotateY(-90deg)}
  .slot:hover .c3d{transform:perspective(950px) translateZ(52px) rotateY(calc(var(--ry)*0.6))}
  .slot:hover .covw{filter:brightness(1.06)}
  .slot.sel .c3d{transform:perspective(950px) translateZ(26px) rotateY(calc(var(--ry)*0.76))}
  .slot.sel .covw{filter:brightness(1.03)}
  /* Layering: the hovered sleeve lifts above its neighbors instantly, and
     keeps that raised layer until the swing-back finishes (the 0s-duration,
     .55s-delay z-index transition) so it never clips through mid-animation. */
  .slot{transition:z-index 0s linear .55s}
  .slot:hover{z-index:360 !important;transition:z-index 0s}
  .slot.sel{z-index:340 !important}
  /* The row parts around the hovered sleeve to give it room to open. */
  .slot:hover ~ .slot .covw{transform:translateX(34px)}
  .slot:has(~ .slot:hover) .covw{transform:translateX(-34px)}

  /* Atmosphere: tops of the sleeves dissolve into the dark header zone,
     bottoms sink under the deck gradient. */
  .fadeTop{position:absolute;left:0;right:0;top:0;height:30vh;background:linear-gradient(#000 24%,transparent);z-index:400;pointer-events:none}

  /* ── Cover art (gradients + inline svg only) ───────────── */
  .cv1{background:linear-gradient(155deg,#2438ff,#0a18b8)}
  .cv1::after{content:'';position:absolute;left:12%;top:10%;width:16%;aspect-ratio:1;background:#fff}
  .cv2{background:#E2B33C}
  .cv2::after{content:'';position:absolute;inset:12%;border:2px solid #221605}
  .cv3{background:#0F5A50}
  .cv4{background:radial-gradient(120% 90% at 50% 35%,#ff6a2f 0%,#a91c05 45%,#230502 100%)}
  .cv5{background:#14141a}
  .cv5 .tag{position:absolute;top:6%;right:9%;font-size:9px;font-weight:600;letter-spacing:.22em;color:#d8b558;z-index:4}
  .cv6{background:#EDEDE8}
  .cv7{background:linear-gradient(115deg,#ff5da2 0 50%,#2a49ff 50% 100%)}
  .cv8{background:#EFE7D8}
  .cv8 .glyph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:ui-serif,Georgia,serif;font-size:130px;color:#191512;z-index:2}
  .cv9{background:linear-gradient(180deg,#173f2b,#0a1f14)}
  .cv9::after{content:'';position:absolute;left:50%;top:42%;width:46%;aspect-ratio:1;transform:translate(-50%,-50%);border:2px solid rgba(255,255,255,.85);border-radius:50%}
  .cv10{background:linear-gradient(180deg,#7c7c80,#2e2e30)}
  .cv10::after{content:'';position:absolute;left:12%;right:12%;bottom:14%;height:8%;background:#ecece9}

  /* ── Deck (bottom overlay) ─────────────────────────────── */
  .deck{position:fixed;left:0;right:0;bottom:0;display:flex;align-items:flex-end;justify-content:space-between;gap:30px;padding:16vh 38px 30px;background:linear-gradient(transparent,rgba(0,0,0,.5) 45%,rgba(0,0,0,.88));z-index:600;pointer-events:none}
  .deck>*{pointer-events:auto}
  .title .sub{font-size:12px;color:rgba(255,255,255,.55);margin-bottom:9px;letter-spacing:-.005em}
  .title .big{font-size:clamp(38px,4.4vw,60px);font-weight:700;letter-spacing:-.035em;line-height:1}
  .ctr{display:flex;align-items:center;gap:12px;margin-bottom:4px}
  .ctr button{display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.25);border-radius:50%;transition:background .15s,border-color .15s}
  .ctr button:hover{background:rgba(255,255,255,.12)}
  .ctr .step{width:44px;height:44px;font-size:16px}
  .ctr .go{width:58px;height:58px;font-size:17px;background:#fff;color:#000;border-color:#fff}
  .ctr .go:hover{opacity:.9;background:#fff}
  .nowv{display:flex;align-items:center;gap:14px;margin-bottom:4px}
  .nowv .t{text-align:right}
  .nowv .k{font-size:11px;color:rgba(255,255,255,.45)}
  .nowv .n{font-size:13px;font-weight:600;letter-spacing:-.01em;margin-top:3px}
  .disc{width:46px;height:46px;border-radius:50%;overflow:hidden;position:relative;flex:none;animation:spin 9s linear infinite;box-shadow:0 4px 14px rgba(0,0,0,.5)}
  .disc .art{position:absolute;inset:0}
  .disc::after{content:'';position:absolute;left:50%;top:50%;width:9px;height:9px;transform:translate(-50%,-50%);background:#000;border-radius:50%;border:2px solid rgba(255,255,255,.35);z-index:5}
  @keyframes spin{to{transform:rotate(360deg)}}

  .hint{position:fixed;right:38px;top:88px;font-size:11px;color:rgba(255,255,255,.28);z-index:700}

  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
  <div class="stage"><div class="row" id="row"></div><div class="fadeTop"></div></div>

  <header class="hdr">
    <div class="mark"><span class="w">GatherOS</span><span class="s">Collections</span></div>
    <div class="toggle"><button class="tg on">Collections</button><button class="tg">Saved</button></div>
    <div class="search"><span>Search</span><b>⌘K</b></div>
  </header>
  <div class="hint">← → to browse · click a sleeve to select</div>

  <div class="deck">
    <div class="title"><div class="sub" id="dsub"></div><div class="big" id="dbig"></div></div>
    <div class="ctr">
      <button class="step" id="prev" aria-label="previous">‹</button>
      <button class="go" aria-label="open collection">↗</button>
      <button class="step" id="next" aria-label="next">›</button>
    </div>
    <div class="nowv">
      <div class="t"><div class="k">Now viewing</div><div class="n" id="nvn"></div></div>
      <div class="disc"><div class="art" id="disc"></div></div>
    </div>
  </div>

<script>
(() => {
  'use strict';

  /* Collections — GatherOS-flavored placeholder data. s = cover style,
     styles ordered to echo the reference palette left → right. */
  const C = [
    { n:'Album art',         c:162, u:'updated 5h ago', s:1  },
    { n:'Type specimens',    c:128, u:'updated 2d ago', s:2  },
    { n:'Film stills',       c:118, u:'updated 8h ago', s:10 },
    { n:'Motion frames',     c:41,  u:'updated 4d ago', s:4  },
    { n:'Editorial layouts', c:203, u:'updated 6h ago', s:5  },
    { n:'Brand refs',        c:86,  u:'updated 1d ago', s:7  },
    { n:'Color studies',     c:33,  u:'updated 1w ago', s:8  },
    { n:'Architecture',      c:95,  u:'updated 2d ago', s:9  },
    { n:'Interiors',         c:54,  u:'updated 3d ago', s:6  },
    { n:'Posters',           c:149, u:'updated 3d ago', s:4  },
    { n:'UI patterns',       c:240, u:'updated 1h ago', s:1  },
    { n:'Product shots',     c:77,  u:'updated 6d ago', s:3  },
  ];

  /* Inline SVG art for the styles that need more than a gradient. */
  function waves() {
    let p = '';
    for (let j = 0; j < 13; j++) {
      const y = 40 + j * 34, a = ((j % 3) + 1) * 12;
      p += `<path d="M24 ${y} C 100 ${y - a}, 220 ${y + a}, 296 ${y}"/>`;
    }
    return `<svg viewBox="0 0 320 480" preserveAspectRatio="none" fill="none" stroke="#cfe8e2" stroke-width="2" opacity=".85">${p}</svg>`;
  }
  function dots(fill, rBase) {
    let c = '';
    for (let r = 0; r < 11; r++) for (let q = 0; q < 7; q++) {
      c += `<circle cx="${32 + q * 42}" cy="${34 + r * 42}" r="${rBase + (r % 4)}"/>`;
    }
    return `<svg viewBox="0 0 320 480" preserveAspectRatio="none" fill="${fill}">${c}</svg>`;
  }
  function covInner(s) {
    if (s === 3) return waves();
    if (s === 5) return `<span class="tag">ARCHIVE</span>` + dots('#23232e', 2);
    if (s === 6) return dots('#1a1a1c', 3);
    if (s === 8) return `<span class="glyph">Aa</span>`;
    return '';
  }

  /* The fan: sleeves near the center sit almost edge-on and open toward
     the viewer as they move outward — left half faces right, right half
     faces left, exactly like standing in front of the middle of a crate.
     Angle magnitude eases from ~84° (center) down to ~40° (edges). */
  const N = C.length;
  const MID = (N - 1) / 2;
  const TH_MAX = 84, TH_MIN = 40;

  const row = document.getElementById('row');
  let sel = 4;

  C.forEach((c, i) => {
    const d = i - MID;
    const t = Math.abs(d) / MID;
    const th = TH_MAX - (TH_MAX - TH_MIN) * Math.pow(t, 1.1);
    const ry = (d < 0 ? 1 : -1) * th;               // left opens right, right opens left
    const br = (0.66 + (1 - th / 90) * 0.5).toFixed(2); // edge-on sleeves sit in shadow
    const z = 10 + Math.round(Math.abs(d) * 20);    // outer sleeves stack in front

    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.style.cssText = `--i:${i};--ry:${ry.toFixed(1)}deg;--br:${br};z-index:${z}`;
    slot.innerHTML = `
      <div class="lab"><div class="n">${c.n}</div><div class="m">${c.c} saves</div><div class="p">▸</div></div>
      <div class="covw"><div class="c3d"><div class="cov cv${c.s}">${covInner(c.s)}</div><div class="edge l"></div><div class="edge r"></div></div></div>`;
    slot.addEventListener('click', () => select(i));
    row.appendChild(slot);
  });

  function select(i) {
    sel = (i + N) % N;
    [...row.children].forEach((el, j) => el.classList.toggle('sel', j === sel));
    const c = C[sel];
    document.getElementById('dbig').textContent = c.n;
    document.getElementById('dsub').textContent = `${c.c} saves · ${c.u}`;
    document.getElementById('nvn').textContent = c.n;
    document.getElementById('disc').className = `art cov cv${c.s}`;
    document.getElementById('disc').innerHTML = covInner(c.s);
  }

  document.getElementById('prev').addEventListener('click', () => select(sel - 1));
  document.getElementById('next').addEventListener('click', () => select(sel + 1));
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') { select(sel - 1); e.preventDefault(); }
    if (e.key === 'ArrowRight') { select(sel + 1); e.preventDefault(); }
  });

  select(sel);
})();
</script>
</body>
</html>
