<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Trash sound effects — 5 ways</title>
<style>
  :root {
    --content-bg: #fafaf9;
    --surface-1: #ffffff;
    --border: rgba(0,0,0,0.08);
    --text-primary: #000;
    --text-secondary: rgba(0,0,0,0.55);
    --text-tertiary: rgba(0,0,0,0.4);
    --accent: #000;
    --hover-bg: #f1f1ef;
    --shadow-control: 0 1px 3px -1px rgba(16,16,19,0.06);
    --font: 'Geist Variable','Geist','SF Pro Display','SF Pro Text',-apple-system,BlinkMacSystemFont,system-ui,'Segoe UI',sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { font-family: var(--font); color: var(--text-primary); background: var(--content-bg); -webkit-font-smoothing: antialiased; }
  header { position: sticky; top: 0; z-index: 5; display: flex; align-items: center; gap: 16px; padding: 14px 20px; background: rgba(250,250,249,0.88); backdrop-filter: saturate(1.6) blur(12px); border-bottom: 1px solid var(--border); }
  h1 { font-size: 16px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  header .sub { font-size: 12px; color: var(--text-tertiary); }
  .vol { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-secondary); }
  .vol input { width: 110px; accent-color: #000; }

  main { max-width: 820px; margin: 0 auto; padding: 22px 18px 80px; }
  .tile { display: flex; align-items: center; gap: 14px; padding: 16px; border: 1px solid var(--border); border-radius: 14px; background: var(--surface-1); box-shadow: var(--shadow-control); margin-bottom: 12px; }
  .key { flex: none; display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 8px; background: rgba(0,0,0,0.05); font-size: 13px; font-weight: 600; color: var(--text-secondary); }
  .body { flex: 1 1 auto; min-width: 0; }
  .name { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .desc { margin-top: 3px; font-size: 12.5px; color: var(--text-secondary); }
  .btns { flex: none; display: flex; gap: 8px; }
  .b { display: inline-flex; align-items: center; gap: 7px; padding: 9px 13px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface-1); box-shadow: var(--shadow-control); font: inherit; font-size: 12.5px; font-weight: 600; color: var(--text-primary); cursor: pointer; white-space: nowrap; }
  .b:hover { background: var(--hover-bg); }
  .b:active { transform: scale(0.97); }
  .b.empty { background: #000; color: #fff; border-color: #000; }
  .b.empty:hover { background: #1f1f1f; }
  .b svg { opacity: 0.7; }
  .b.empty svg { opacity: 0.9; }
  .foot { margin-top: 16px; font-size: 12px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <header>
    <div>
      <h1>Trash sound effects</h1>
      <div class="sub">click "move to trash" or "empty trash" on any row · synthesized live, no files</div>
    </div>
    <label class="vol">volume <input id="vol" type="range" min="0" max="100" value="55" /></label>
  </header>
  <main>
    <div id="list"></div>
    <div class="foot">Keys: <b>1–5</b> play "move to trash", <b>Shift + 1–5</b> play "empty trash". Audio starts on your first click.</div>
  </main>

<script>
  let ac, masterGain;
  function ctx() {
    if (!ac) { ac = new (window.AudioContext || window.webkitAudioContext)(); masterGain = ac.createGain(); masterGain.gain.value = 0.55; masterGain.connect(ac.destination); }
    if (ac.state === 'suspended') ac.resume();
    return ac;
  }
  function env(g, t, a, d, peak) { g.gain.setValueAtTime(0.0001, t); g.gain.exponentialRampToValueAtTime(Math.max(peak,0.0002), t+Math.max(a,0.001)); g.gain.exponentialRampToValueAtTime(0.0001, t+a+d); }
  function tone(o) {
    const c = ctx(); const t = o.t0 ?? c.currentTime;
    const osc = c.createOscillator(); osc.type = o.type || 'sine';
    osc.frequency.setValueAtTime(o.f0, t);
    if (o.f1 != null) osc.frequency.exponentialRampToValueAtTime(o.f1, t + o.dur);
    let node = osc;
    if (o.lp) { const f = c.createBiquadFilter(); f.type='lowpass'; f.frequency.value=o.lp; osc.connect(f); node=f; }
    const g = c.createGain(); node.connect(g); g.connect(masterGain);
    env(g, t, o.a ?? 0.004, o.dur-(o.a ?? 0.004), o.peak ?? 0.3);
    osc.start(t); osc.stop(t+o.dur+0.03);
  }
  function noise(o) {
    const c = ctx(); const t = o.t0 ?? c.currentTime;
    const len = Math.ceil(c.sampleRate * Math.max(o.dur,0.05));
    const buf = c.createBuffer(1, len, c.sampleRate); const d = buf.getChannelData(0);
    for (let i=0;i<len;i++) d[i] = Math.random()*2-1;
    const n = c.createBufferSource(); n.buffer = buf;
    const filt = c.createBiquadFilter(); filt.type = o.type || 'bandpass'; filt.frequency.setValueAtTime(o.f||1500, t); filt.Q.value = o.q||1;
    if (o.f1) filt.frequency.exponentialRampToValueAtTime(o.f1, t+o.dur);
    const g = c.createGain(); n.connect(filt); filt.connect(g); g.connect(masterGain);
    env(g, t, o.a ?? 0.002, o.dur-(o.a ?? 0.002), o.peak ?? 0.3);
    n.start(t); n.stop(t+o.dur+0.03);
  }
  function at(off) { const c = ctx(); return c.currentTime + off; }
  function crumple(dur, grains, peak) {
    const c = ctx(); const start = c.currentTime;
    for (let i=0;i<grains;i++) {
      const t = start + (i/grains)*dur + Math.random()*0.012;
      noise({ t0:t, dur:0.03+Math.random()*0.035, type:'highpass', f:1700+Math.random()*1500, q:0.8, peak: peak*(0.4+Math.random()*0.7), a:0.001 });
    }
  }
  function thunk(off, pitch) {
    const c = ctx(); const t = c.currentTime + off; const p = pitch || 1;
    tone({ type:'sine', f0:150*p, f1:85*p, dur:0.13, t0:t, a:0.001, peak:0.5, lp:600 });
    noise({ t0:t, dur:0.04, type:'lowpass', f:900, peak:0.18 });
  }

  const TRASH = [
    { name:'Crumple', desc:'Paper crinkling into a ball.',
      move(){ crumple(0.18, 4, 0.30); },
      empty(){ crumple(0.42, 8, 0.32); tone({ type:'sine', f0:120, f1:70, dur:0.26, t0:at(0.05), peak:0.24, lp:500 }); } },
    { name:'Whoosh away', desc:'A quick downward swoosh, like it’s pulled away.',
      move(){ noise({ dur:0.20, type:'lowpass', f:1700, f1:200, peak:0.30, a:0.005 }); },
      empty(){ noise({ dur:0.46, type:'lowpass', f:2300, f1:130, peak:0.32, a:0.02 }); tone({ type:'sine', f0:150, f1:60, dur:0.18, t0:at(0.4), peak:0.34, lp:400 }); } },
    { name:'Soft thunk', desc:'A muted drop into the bin.',
      move(){ thunk(0); },
      empty(){ thunk(0); thunk(0.10, 1.15); thunk(0.20, 0.88); } },
    { name:'Sweep', desc:'A broom-sweep brush of noise.',
      move(){ noise({ dur:0.22, type:'highpass', f:3200, f1:1400, peak:0.22, a:0.045 }); },
      empty(){ noise({ dur:0.46, type:'highpass', f:3600, f1:900, peak:0.24, a:0.07 }); noise({ t0:at(0.4), dur:0.06, type:'bandpass', f:1500, q:1.5, peak:0.2 }); } },
    { name:'Poof', desc:'A soft puff of disintegration.',
      move(){ noise({ dur:0.16, type:'lowpass', f:950, f1:420, peak:0.26, a:0.006 }); },
      empty(){ noise({ dur:0.34, type:'lowpass', f:1300, f1:300, peak:0.30, a:0.02 }); tone({ type:'sine', f0:200, f1:90, dur:0.20, t0:at(0.02), peak:0.18, lp:600 }); } },
  ];

  const TRASH_ICO = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
  document.getElementById('list').innerHTML = TRASH.map((s, i) => `
    <div class="tile">
      <span class="key">${i+1}</span>
      <span class="body"><span class="name">${s.name}</span><span class="desc">${s.desc}</span></span>
      <span class="btns">
        <button class="b" data-i="${i}" data-v="move">${TRASH_ICO} Move to trash</button>
        <button class="b empty" data-i="${i}" data-v="empty">${TRASH_ICO} Empty trash</button>
      </span>
    </div>`).join('');

  function play(i, v) { try { TRASH[i][v](); } catch (e) {} }
  document.getElementById('list').addEventListener('click', (e) => {
    const b = e.target.closest('.b'); if (!b) return;
    play(+b.dataset.i, b.dataset.v);
  });
  document.getElementById('vol').addEventListener('input', (e) => { ctx(); masterGain.gain.value = e.target.value/100; });
  window.addEventListener('keydown', (e) => {
    if (e.key >= '1' && e.key <= '5') { play(+e.key-1, 'move'); }
    else if (['!','@','#','$','%'].includes(e.key)) { play(['!','@','#','$','%'].indexOf(e.key), 'empty'); }
  });
</script>
</body>
</html>
