name = "gatherlocal-api"
main = "src/index.ts"
compatibility_date = "2025-01-15"

# D1: licensing database. Run `npm run db:create` once, then paste
# the printed database_id below before deploying.
[[d1_databases]]
binding = "DB"
database_name = "gatherlocal-db"
database_id = "replace-with-your-d1-database-id"
migrations_dir = "migrations"

# Non-secret config. Secrets go through `wrangler secret put` so they
# never end up in source control. See server/README.md for the full
# list of secrets the worker needs.
[vars]
APP_NAME = "GatherLocal"
# 0 disables the server-side trial entirely — users go straight to
# the paywall after first sign-in. Lemon Squeezy's variant-level
# trial is the only trial the user ever sees.
TRIAL_DAYS = "36500"
# Custom URL scheme the desktop app registers. Magic-link emails point
# at https://api.gatheros.co/auth/verify?token=… which redirects
# into this scheme so the app picks up the session token natively.
APP_DEEP_LINK_SCHEME = "gatherlocal"
EMAIL_FROM = "GatherLocal <noreply@mail.gatherlocal.local>"
# 'true' = Lemon Squeezy test mode, 'false' = live. Affects which
# checkouts the worker creates. Webhook signature verification works
# the same in either mode.
LEMONSQUEEZY_TEST_MODE = "false"
LEMONSQUEEZY_STORE_ID = "368336"
LEMONSQUEEZY_VARIANT_MONTHLY = "1708182"
LEMONSQUEEZY_VARIANT_YEARLY = "1708191"
