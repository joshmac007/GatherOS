<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="shell">
    <header class="head">
      <span class="brand">GatherOS</span>
      <span class="status" id="status" title="GatherOS connection">
        <span class="dot dot-checking" id="dot"></span>
        <span class="status-text" id="statusText">Checking…</span>
      </span>
    </header>

    <div class="actions">
      <button type="button" class="btn" id="capturePage">
        <span class="btn-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="M2 8h20"/><path d="M6 4v4"/><path d="M10 4v4"/></svg>
        </span>
        <span class="btn-text">
          <span class="btn-label">Capture page</span>
          <span class="btn-sub">Visible browser area</span>
        </span>
      </button>

      <button type="button" class="btn" id="captureFullPage">
        <span class="btn-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 2h10"/><path d="M5 6h14"/><rect width="18" height="12" x="3" y="10" rx="2"/></svg>
        </span>
        <span class="btn-text">
          <span class="btn-label">Capture full page</span>
          <span class="btn-sub">Entire scrollable page</span>
        </span>
      </button>

      <button type="button" class="btn" id="captureArea">
        <span class="btn-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2v14a2 2 0 0 0 2 2h14"/><path d="M18 22V8a2 2 0 0 0-2-2H2"/></svg>
        </span>
        <span class="btn-text">
          <span class="btn-label">Capture area</span>
          <span class="btn-sub">Drag to select a region</span>
        </span>
      </button>

      <button type="button" class="btn" id="saveUrl">
        <span class="btn-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 1 1 0 10h-2"/><line x1="8" x2="16" y1="12" y2="12"/></svg>
        </span>
        <span class="btn-text">
          <span class="btn-label">Save URL</span>
          <span class="btn-sub">This page as a link</span>
        </span>
      </button>
    </div>

    <button type="button" class="btn-open" id="openApp">
      <span class="btn-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
      </span>
      <span>Open GatherOS</span>
    </button>

    <div class="hint" id="hint" hidden></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
